name: Publish SNAPSHOT Dependencies

on:
  push:
    branches: ["dev"]
    paths:
      - 'subprojects/tree-sitter/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
  workflow_dispatch:
    inputs:
      publish_all:
        description: 'Publish all SNAPSHOT modules'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  # Publishing credentials
  ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MVN_USERNAME }}
  ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MVN_PASSWORD }}
  ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MVN_SIGNING_KEY }}
  ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.MVN_SIGNING_KEY_ID }}
  ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MVN_SIGNING_KEY_PASSWORD }}

  # Build configuration
  BUILD_JAVA_VERSION: '17'
  BUILD_JAVA_DIST: 'temurin'

jobs:
  # Job untuk memeriksa perubahan
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      tree_sitter_changed: ${{ steps.check.outputs.tree_sitter_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tree-sitter changes
        id: check
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "subprojects/tree-sitter/"; then
            echo "tree_sitter_changed=true" >> $GITHUB_OUTPUT
            echo "✅ Tree-sitter changes detected"
          else
            echo "tree_sitter_changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ No tree-sitter changes detected"
          fi

  # Job untuk publish tree-sitter SNAPSHOTS
  publish-tree-sitter-snapshots:
    name: Publish Tree-sitter SNAPSHOTS
    runs-on: ubuntu-latest
    needs: check-changes
    if: |
      needs.check-changes.outputs.tree_sitter_changed == 'true' || 
      github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        module:
          - android-tree-sitter
          - tree-sitter-java
          - tree-sitter-json
          - tree-sitter-kotlin
          - tree-sitter-log
          - tree-sitter-xml
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.BUILD_JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.BUILD_JAVA_VERSION }}
          distribution: ${{ env.BUILD_JAVA_DIST }}

      - name: Change Gradle wrapper permissions
        run: chmod +x ./gradlew

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Publish ${{ matrix.module }} SNAPSHOT
        run: |
          echo "📦 Publishing ${{ matrix.module }} SNAPSHOT..."
          ./gradlew :subprojects:tree-sitter:${{ matrix.module }}:publishAllPublicationsToMavenCentralRepository --stacktrace
        continue-on-error: true

  # Job alternatif: Publish semua tree-sitter modules sekaligus
  publish-all-tree-sitter-snapshots:
    name: Publish All Tree-sitter SNAPSHOTS
    runs-on: ubuntu-latest
    needs: check-changes
    if: |
      (needs.check-changes.outputs.tree_sitter_changed == 'true' && github.event_name != 'workflow_dispatch') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_all == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.BUILD_JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.BUILD_JAVA_VERSION }}
          distribution: ${{ env.BUILD_JAVA_DIST }}

      - name: Change Gradle wrapper permissions
        run: chmod +x ./gradlew

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Publish all tree-sitter SNAPSHOTS
        run: |
          echo "📦 Publishing all tree-sitter SNAPSHOTS..."
          ./gradlew :subprojects:tree-sitter:publishAllPublicationsToMavenCentralRepository --stacktrace

  # Job untuk publish ke Maven Local (sebagai fallback)
  publish-to-maven-local:
    name: Publish to Maven Local
    runs-on: ubuntu-latest
    needs: check-changes
    if: |
      needs.check-changes.outputs.tree_sitter_changed == 'true' || 
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.BUILD_JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.BUILD_JAVA_VERSION }}
          distribution: ${{ env.BUILD_JAVA_DIST }}

      - name: Change Gradle wrapper permissions
        run: chmod +x ./gradlew

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Publish to Maven Local
        run: |
          echo "📦 Publishing tree-sitter to Maven Local..."
          ./gradlew :subprojects:tree-sitter:publishToMavenLocal --stacktrace

      - name: Upload Maven Local artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-local-tree-sitter
          path: ~/.m2/repository/com/itsaky/androidide/treesitter/

  # Job untuk verifikasi publikasi
  verify-publication:
    name: Verify Publication
    runs-on: ubuntu-latest
    needs: [publish-tree-sitter-snapshots, publish-all-tree-sitter-snapshots]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.BUILD_JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.BUILD_JAVA_VERSION }}
          distribution: ${{ env.BUILD_JAVA_DIST }}

      - name: Change Gradle wrapper permissions
        run: chmod +x ./gradlew

      - name: Verify SNAPSHOT dependencies
        run: |
          echo "🔍 Verifying SNAPSHOT dependencies..."
          ./gradlew :app:dependencies --configuration releaseCompileClasspath | grep "tree-sitter"

  # Job untuk notifikasi
  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [publish-tree-sitter-snapshots, publish-all-tree-sitter-snapshots, verify-publication]
    if: always()
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.publish-tree-sitter-snapshots.result }}" == "success" ] || [ "${{ needs.publish-all-tree-sitter-snapshots.result }}" == "success" ]; then
            echo "✅ SNAPSHOT publication successful!"
          else
            echo "❌ SNAPSHOT publication failed!"
            exit 1
          fi

      - name: Create summary
        run: |
          echo "## 📦 SNAPSHOT Publication Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results:" >> $GITHUB_STEP_SUMMARY
          echo "- Tree-sitter SNAPSHOTS: ${{ needs.publish-tree-sitter-snapshots.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- All Tree-sitter: ${{ needs.publish-all-tree-sitter-snapshots.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Verification: ${{ needs.verify-publication.result }}" >> $GITHUB_STEP_SUMMARY